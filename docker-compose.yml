# AdNova 컨테이너 구성 (DIRECTION_v6 T5) — 초안: 한의정 (인프라 도메인: 유연정 — 막바지 합의로 작성, PR 기록)
#
# 목적 (GCP 종료 대비):
#   ① 재현성 박제 — 발표·이력용으로 전체 스택이 어느 머신에서든 다시 뜬다.
#   ② 생존 경로 — GPU 없는 환경에서 backend-web(CPU) + ENGINE_POLICY=api 로 완전 동작.
#   ③ gpu-worker 는 프로파일(--profile gpu)로만 — GPU 호스트에서만 켠다. 모델(HF 캐시 53G)은
#      이미지에 굽지 않고 볼륨 마운트 (VRAM/디스크 규칙: CLAUDE.md 참조).
#
# 사용:
#   CPU 스택(생존 경로):  docker compose up backend-web frontend
#   GPU 포함(GCP/로컬GPU): docker compose --profile gpu up
#   비밀키: backend/.env (gitignore) — OPENAI_API_KEY, LANGFUSE_*

services:
  backend-web:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - path: ./backend/.env      # OPENAI_API_KEY, LANGFUSE_* (없으면 무키 동작 — 관측만 꺼짐)
        required: false
    environment:
      DATABASE_URL: sqlite:////data/app.db
      CORS_ORIGINS: http://localhost:3000
      # GPU 워커가 떠 있으면 배포구조 B(원격 생성), 없으면 비워서 모놀리식(CPU=API 경로만)
      GENERATION_SERVICE_URL: ${GENERATION_SERVICE_URL:-}
      ENGINE_POLICY: ${ENGINE_POLICY:-api}   # GCP 종료 후 기본 생존값
      API_BUDGET_USD: ${API_BUDGET_USD:-2.0}
    volumes:
      - adnova-data:/data                        # sqlite·업로드 영속
      - adnova-results:/app/results              # 생성 결과 (results/ai)
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend-next
      args:
        # Next 는 NEXT_PUBLIC_* 을 빌드 시점에 굽는다 — 배포 주소에 맞춰 --build-arg 로 교체
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
    ports:
      - "3000:3000"
    depends_on:
      - backend-web
    restart: unless-stopped

  # --- GPU 생성 워커 (프로파일: gpu) ------------------------------------------
  # 요구: NVIDIA 드라이버 + nvidia-container-toolkit. HF 캐시·rembg 모델은 호스트 마운트.
  gpu-worker:
    build:
      context: ./backend
      args:
        COMPUTE: gpu            # 원본 requirements(onnxruntime-gpu·bitsandbytes 포함)로 설치
    profiles: ["gpu"]
    command: ["uvicorn", "app.generation_app:app", "--host", "0.0.0.0", "--port", "8100"]
    ports:
      - "8100:8100"
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
    volumes:
      - ${HF_CACHE_DIR:-~/.cache/huggingface}:/root/.cache/huggingface
      - ${U2NET_DIR:-~/.u2net}:/root/.u2net
      - adnova-results:/app/results
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: ["gpu"]
    restart: unless-stopped

volumes:
  adnova-data:
  adnova-results:
