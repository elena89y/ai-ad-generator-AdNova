# gpt_service 프롬프트 원장 — 담당: 한의정. (DIRECTION_v6 T1 소프트코딩)
#
# ⚠️ 이 파일의 모든 문구는 실측으로 튜닝된 값이다. 한 글자라도 바꾸면
#    tests/test_prompt_snapshots.py 가 실패한다 — 의도적 변경이면 실험로그 기록 후
#    `python -m tests.prompt_capture` 로 골든을 같은 커밋에서 갱신할 것.
# 자리표시자는 string.Template 문법(${name}) — JSON 예시의 중괄호와 충돌하지 않는다.
# 로더: app/services/prompt_registry.py
style_tone:
  monotone: 절제되고 미니멀한 톤. 짧고 세련된 표현, 불필요한 수식어 배제
  warm_vintage: 따뜻하고 감성적인 톤. 포근한 정서와 추억을 자극하는 표현
  pop: 발랄하고 에너지 넘치는 톤. 리듬감 있는 표현과 감탄사 활용 가능
  editorial: 고급스럽고 정제된 톤. 프리미엄 매거진 헤드라인처럼 짧고 단정한 단문
  retro_paper: 복고풍의 정겨운 톤. 오래된 간판·손글씨 광고 같은 친근하고 담백한 표현
  pastel_float: 가볍고 산뜻한 톤. 부드럽고 몽글몽글한 표현, 상큼함과 설렘 강조
purpose_guide:
  sns: 인스타그램 피드 게시물. 첫 줄에 후킹, 이모지 적절히 활용, 해시태그 5~8개
  card_news: 카드뉴스 표지. 호기심을 유발하는 한 줄, 해시태그 3~5개
  banner: 웹 배너. 매우 짧고 강한 한 줄, 해시태그 최소
  detail_page: 상세페이지 도입부. 신뢰감 있는 설명형, 해시태그 불필요 시 빈 배열
  flyer: 오프라인 전단지. 직관적 혜택 강조, 해시태그 불필요 시 빈 배열
platform_persona:
  instagram: 비주얼·감성 중심. 첫 줄 강한 후킹, 이모지 적절히, 해시태그 6~10개. body 2~3문장.
  facebook: 정보·친근형. 혜택과 CTA 명확, body 2~4문장으로 조금 길게, 해시태그 2~4개.
  x: 짧고 위트있게. 트렌디한 한두 문장, body 1~2문장, 해시태그 1~3개.
  threads: 대화체·솔직담백. 친구에게 말하듯 캐주얼, body 1~3문장, 해시태그 0~3개.
judge_sys: You are a strict, experienced food/product advertising art director. Score honestly — a mediocre
  ad gets 5-6, not 8. Reserve 9-10 for images that could run in a real premium campaign.
generate_copy:
  retry_note: '

    - ⚠️ 직전 시도가 규칙을 어겼어. 다음을 반드시 고쳐서 다시 써: ${feedback}'
  instruction: '아래 광고 이미지와 상품 정보를 바탕으로 한국어 광고 카피를 작성해줘.

    - 상품: ${product_context}

    - 문구 톤: ${style_tone}

    요구사항: 국내 카페 광고처럼 짧게 써. 헤드라인 1줄(공백 포함 16자 이내), 서브카피는 꼭 필요할 때만 1줄(공백 포함 22자 이내)이고 필요 없으면 비워. 장면을 설명하는
    문장(예: 테이블 위 한 잔)은 쓰지 마. 모든 문구 끝의 마침표·쉼표·느낌표를 빼. 줄바꿈은 두 문구 사이에 정확히 한 번만 사용해. 이미지에 실제로 보이는 분위기·소품과 어울려야
    하고, 이미지에 없는 요소를 지어내지 마.${retry_note}

    반드시 JSON 으로만 응답: {"copy": "헤드라인\n서브카피"}'
  caption_line: '${instruction}

    - 이미지 장면 묘사(캡션): ${caption}'
generate_sns_copy:
  instruction: '아래 상품의 홍보 문구를 한국어로 작성해줘.

    - 상품: ${product_context}

    - 문구 톤: ${style_tone}

    - 용도: ${purpose_guide}

    해시태그는 # 포함 문자열 배열로. 반드시 JSON 으로만 응답: {"caption": "...", "hashtags": ["#...", "#..."]}'
platform_copy:
  honesty_base: '정직성(중요): 이미지·상품에 실제로 있는 것만 표현해. 없는 재료·효능·수상·원산지·할인·최상급 표현을 지어내지 마.'
  honesty_allowed: ' 재료·맛 관련 표현은 다음 실제 구성만 근거로 삼아: ${allowed}.'
  ground: '

    - 이미지 실제 묘사(사실 근거): ${image_desc}'
  fix: '

    - ⚠️ 직전 시도가 실제에 없는 재료를 지어냈어: ${extra}. 이 표현들을 빼고 다시 써.'
  instruction: '아래 상품으로 4개 SNS 매체별 광고 카피를 한국어로 작성해줘.

    - 상품: ${product_context}

    - 문구 톤: ${style_tone}

    - ${honesty}${ground}${fix}

    - 모든 카피는 자연스러운 한국어로 써. 위 영문 재료명·이미지 묘사는 내용 참고용일 뿐이니 영어 단어를 그대로 노출하지 말고 한국어로 자연스럽게 옮겨(예: tapioca pearls→타피오카
    펄).

    매체별 페르소나:

    ${persona}

    각 매체는 headline(임팩트 있는 1줄), body(페르소나에 맞는 문장), hashtags(# 포함 문자열 배열)로.

    또한 카피에서 네가 언급한 구체적 재료를 claimed_ingredients(영문 소문자 배열)로 함께 보고해(환각 검증용, 언급 없으면 []).

    반드시 JSON 으로만 응답: {"instagram":{"headline":"","body":"","hashtags":["#..."]},"facebook":{"headline":"","body":"","hashtags":[]},"x":{...},"threads":{...},"claimed_ingredients":["..."]}'
judge_ad:
  ident: ' Also judge how well it preserved the original product''s identity and followed the edit "${instruction}"
    (first image = original, second = result).'
  rubric: 'Rate this food/product advertisement image on each axis from 1(poor) to 10(excellent): appetizing,
    realism(photographic, not CGI/plastic), artifact_free(no warping/extra fingers/gibberish/melting),
    composition(lighting·framing·ad polish), adherence.${ident} Reply ONLY JSON: {"appetizing":N,"realism":N,"artifact_free":N,"composition":N,"adherence":N,"overall":N,"reason":"one
    short sentence"}'
compare_ads:
  question: 'As a strict food/product ad art director, which is the better advertisement — considering
    appetite appeal, photographic realism, absence of artifacts, and faithfulness to the real product?
    Richer color/gloss/enhancement is GOOD if it still looks like a real photo; penalize only genuine
    flaws (warping, CGI/plastic look, fake blur). Reply ONLY JSON: {"winner":"first" or "second","reason":"one
    short sentence"}'
  lead_ref: 'The first image is the ORIGINAL for reference. '
judge_calibrated:
  intro: 'The first ${n_refs} images are REFERENCE examples of our TARGET ''${style_key}'' advertising
    aesthetic (${mood}). The LAST image is a CANDIDATE ad we generated. Rate how well the candidate matches
    this target, 1(off-target) to 10(indistinguishable from the references in quality and style), on:
    style_match(mood·color·layout), execution(typography·lighting·composition polish), identity(product
    looks real and faithful), overall. ${extra_part}Reply ONLY JSON: {"style_match":N,"execution":N,"identity":N,"overall":N,"improve":"one
    concrete suggestion"}'
english_labels:
  instruction: '아래 상품의 광고 포스터용 영문 라벨 2개를 만들어줘.

    - 상품: ${product_context}

    규칙: name 은 상품의 실제 메뉴명을 영문 대문자 2~4단어로 (브랜드명·과장 금지), phrase 는 상품 분위기를 담은 영문 대문자 3~6단어. 둘 다 영문자·공백·&만
    사용.

    반드시 JSON 으로만 응답: {"name": "STRAWBERRY ADE", "phrase": "FRESH BERRY REFRESHMENT"}'
# v6-1 F1(2026-07-21): 상세페이지 섹션별 전용 카피 — 한 번 호출 JSON.
# honesty/ground/fix 조각은 platform_copy 원장을 재사용한다(코드 _detail_copy_instruction).
detail_copy:
  instruction: '아래 상품의 판매 상세페이지 섹션별 카피를 한국어로 작성해줘.

    - 상품: ${product_context}

    - 문구 톤: ${style_tone}

    - 기존 광고 헤드라인(참고만, 그대로 재사용 금지): ${headline}

    - 기존 서브카피(참고): ${subcopy}

    - ${honesty}${ground}${fix}

    섹션 구성과 규칙(글자 수는 공백 포함, 모든 문구 끝의 마침표·느낌표 제거):

    1) intro_headline: 페이지 맨 위 후킹 한 줄, 16자 이내. 기존 헤드라인과 다른 표현으로.

    2) story_title: 상품 스토리 제목 한 줄, 18자 이내.

    3) story_body: 상품을 신뢰감 있게 소개하는 본문 2~3문장(문장 끝 마침표는 허용). 과장·최상급
    없이 실제 특징만.

    4) benefit_bullets: 구매 포인트 3개 배열, 각 14자 이내 명사형.

    5) top_view_label: 위에서 내려다본 사진 섹션 라벨, 4~10자 명사형. 금지: 카메라·시점
    단어(위에서, 탑뷰, 샷, 앵글), ''제품''·''잔''·''플레이팅'' 같은 상품 불문 한 단어 라벨.
    이 상품만의 구성·색·질감이 드러나게 써 (김치찌개→''한그릇 구성'', 베리 케이크→''베리가
    소복이'' 처럼 — 이 예시 문구 자체를 재사용하지 마).

    6) closeup_caption: 클로즈업 질감 섹션 캡션 한 줄, 12자 이내.

    7) profile_title: 측면/형태 섹션 짧은 제목, 최대 2줄, 각 줄 6자 내외, 줄바꿈은 \n 하나만.

    8) profile_caption: 그 옆 보조 문장 한 줄, 22자 이내.

    9) lifestyle_line: 사용/연출 장면 위 감성 한 줄, 18자 이내. intro_headline 과 다른 표현으로.

    10) cta_title: 구매 유도 큰 제목, 8자 내외. cta_label: 버튼 문구, 6자 내외.

    각 섹션 문구는 서로 겹치지 않게 써(같은 문장 반복 금지). 카피에서 네가 언급한 구체적 재료를
    claimed_ingredients(영문 소문자 배열)로 함께 보고해(환각 검증용, 언급 없으면 []).

    반드시 JSON 으로만 응답: {"intro_headline":"","story_title":"","story_body":"","benefit_bullets":["","",""],"top_view_label":"","closeup_caption":"","profile_title":"...\n...","profile_caption":"","lifestyle_line":"","cta_title":"","cta_label":"","claimed_ingredients":[]}'
section_labels:
  instruction: '아래 상품의 상세페이지 섹션 문구 4개를 만들어줘.

    - 상품명: ${product_name}

    - 영문 키워드: ${subject_en}

    - 카테고리: ${domain} (food=음식, drink=음료, object=제품)

    - 광고 헤드라인(참고용): ${headline}

    규칙:

    1) top_view_label: 위에서 내려다본 사진 섹션의 라벨. 8자 내외 한글, 상품의 실제 형태에 맞는 표현 사용(그릇에 담긴 음식이면 ''플레이팅'', 잔에 담긴 음료면
    ''잔'', 낱개 제품이면 ''제품'' 등). 명사형으로 끝낼 것.

    2) detail_title: 클로즈업 질감 섹션의 짧은 제목. 최대 2줄, 각 줄 6자 내외, 줄바꿈은 \n 하나만 사용.

    3) cta_title: 페이지 맨 아래 구매 유도 큰 제목. 8자 내외 한글.

    4) cta_label: 그 아래 작은 버튼 문구. 6자 내외 한글(예: 자세히 보기, 지금 주문하기).

    없는 재료·효능·수식어를 지어내지 말고 상품명·카테고리에서 자연스럽게 나오는 표현만 써.

    반드시 JSON 으로만 응답: {"top_view_label": "...", "detail_title": "...\n...", "cta_title": "...", "cta_label":
    "..."}'
cake_recipe:
  hint: ' 이미지 관찰: ${image_desc}.'
  instruction: '너는 10년 경력의 호텔 파티쉐이자 미슐랭 디저트 셰프이고 상업 음식사진 비주얼 디렉터야.

    케이크 이름: ${display} (영문: ${subject_en}).${hint}

    이 케이크의 **실제로 판매 가능한** 단면 레이어 구성을 식감 대비·레이어 구조를 고려해 Bottom→Top 으로 재구성해.

    각 레이어는 광고 사진 수준의 영문 물성 묘사(수분감·점성·광택·공기감·질감)로 1문장씩. 그 케이크에 실재하지 않을 재료는 지어내지 마(정직성).

    **중요:** 상품명이 케이크·디저트(생크림/무스/레이어 케이크류)가 아니면 — 전자제품·사물·음료·일반 음식 등 — 반드시 plausible=false, layers=[] 로
    응답해. 마우스·가방 같은 사물을 억지로 케이크로 해석하지 마.

    JSON 으로만: {"plausible":true/false,"layers":["Layer 1: ...(english)","Layer 2: ...", ...4~6개],"top":"top
    decoration in english"}'
analyze_menu:
  instruction: '너는 소상공인 광고 파이프라인의 상품 분석기야. 아래 ''상품명''을 분석해 JSON 으로만 응답해.

    - 상품명: ${display_name}

    규칙:

    1. domain: 먹는 음식이면 ''food'', 사물·제품(전자기기·주방용품·뷰티툴·잡화 등)이면 ''object''.

    2. category(food 일 때만 의미): [${menu_categories}] 중 하나. 생소고기=beef, 생돼지고기=pork, 국·탕·찌개=soup, 튀김=fried,
    빵·디저트=bakery, 구이=grill, 그 외=default. object 면 ''default''.

    3. subject_en: 이미지용 영어 설명(2~6단어, 항상 영어. 한글이면 번역). 브랜드명·과장 금지, 실제 상품만.

    4. core_ingredients: (food) 원래 들어가는 핵심 재료 영어 배열(최대 4개). object 면 [].

    5. texture_hero: (food) 미세 텍스처가 상품의 핵심이면 true (마블링 생소고기·눈꽃치즈 파우더·회 등). 그 외 false. object 면 false.

    6. material: (object) ''reflective''(금속·거울·유광), ''transparent''(유리·투명), ''matte''(무광 플라스틱·세라믹·천),
    애매하면 ''default''. food 면 ''default''.

    7. food_mode: (food) 그릇·용기에 담겨 나오는 음식점 요리(국·탕·밥·구이·정식·치킨 등)=''dish'', 카페의 이산 제품(음료·커피·케이크·베이커리·디저트·마들렌
    등)=''cafe''. object 면 ''dish''.

    8. lang: 상품명이 한글이면 ''ko'', 영어면 ''en''.

    9. serving_type: 제공 형태. ''dish''=식사 음식(국·탕·밥·구이·면과 떡볶이·떡국 같은 분식, 붕어빵·호떡·꽈배기처럼 손에 들고 먹는 길거리 간식,
    호빵·만두 같은 찜기류, 김밥·도시락·치킨·샌드위치·버거), ''drink''=마시는 음료(음료와 디저트가 병기된 세트 메뉴도 drink), ''dessert''=접시에
    내는 단 디저트(케이크·타르트·마카롱, 버터떡·인절미 같은 단 떡, 약과·아이스크림·빙수·파르페), ''bakery''=빵·페이스트리(크루아상·소금빵·앙버터·베이글·스콘),
    ''object''=사물과 밀키트·티백·원두·파우치 같은 포장 판매 식품. object 도메인이면 ''object''.

    반드시 JSON: {"domain":"object","category":"default","subject_en":"wireless computer mouse","core_ingredients":[],"texture_hero":false,"material":"reflective","food_mode":"dish","lang":"ko","serving_type":"object"}'
analyze_photo:
  instruction: "너는 소상공인 광고 파이프라인의 사진·상품 통합 분석기야. 사진과 상품명을 함께 분석해 아래 키를 정확히 사용한 JSON으로만 응답해.\n- 상품명: ${display_name}\n\
    입력 게이트는 관대하게 판단해. 사진의 주 피사체가 상품명과 같은 종류 또는 같은 대분류의 음식·음료·제품이면 match=true이고, 색·브랜드·세부 차이는 무시해. 상품이\
    \ 전혀 없는 무관한 사람·동물·풍경·빈 배경처럼 명백히 다를 때만 match=false로 해.\n분류 규칙:\n1. domain은 먹는 상품이면 food, 사물·제품이면 object.\n\
    2. category는 food일 때 [${menu_categories}] 중 하나, object는 default.\n3. subject_en은 실제 상품만 설명하는 영어 2~6단어.\
    \ 브랜드명·과장 금지.\n4. core_ingredients는 food의 핵심 재료를 English words only 배열 최대 4개, object는 [].\n5. texture_hero는\
    \ 마블링·파우더·회처럼 미세 텍스처가 상품 핵심일 때만 true.\n6. material은 matte|reflective|transparent|default 중 하나. 사진의\
    \ 실제 표면을 근거로 해.\n7. food_mode는 그릇 요리면 dish, 카페 음료·케이크·베이커리·디저트면 cafe, object는 dish.\n8. lang은 상품명이\
    \ 한글이면 ko, 영어면 en. display_name은 입력 상품명을 그대로 보존해.\n9. container_kind와 container_color는 사진 속 주 상품 용기\
    \ 기준 영어 소문자. 용기가 없으면 kind=none, color=none. container_opacity는 opaque|transparent|translucent 중 하나.\n\
    10. temperature는 사진의 김·성에·얼음 근거를 우선하고 상품명을 보조해 hot|iced|ambient 중 하나.\n11. view_angle은 eye|high|top\
    \ 중 하나. visible_text는 제품 표면에 실제 보이는 글자 원문이며 없거나 판독 불가하면 빈 문자열. seen은 사진에 실제 보이는 것을 한국어 한 줄로 써.\n12.\
    \ 제품 이해 — 광고 재연출 시 무엇을 보존하고 무엇을 바꿔도 되는지 파트를 나눠. identity_parts는 상품의 정체성이라 반드시 원본대로 보존할 부분(상품 본체·로고·라벨·브랜드\
    \ 각인), flexible_parts는 상품이 아니라 담는 용기·그릇·받침처럼 무드에 맞게 색·재질을 바꿔도 되는 부분. 둘 다 English words only 배열(최대\
    \ 5개).\n  - 음료: 음료 자체와 라떼아트·거품은 identity, 컵·잔·머그·받침은 flexible.\n  - 로고·라벨 있는 사물(향수·전자제품·화장품): 상품 전체가\
    \ identity(형태·로고·색 보존), flexible=[].\n  - 그릇 요리: 음식 자체가 identity, 담는 접시·볼은 flexible.\n  판단 불가하면 identity=[],\
    \ flexible=[] (호출부가 전체 보존으로 안전 폴백).\n13. serving_type은 dish|drink|dessert|bakery|object 중 하나 —\
    \ 그릇 요리·분식(떡볶이·떡국)·길거리 간식(붕어빵·호떡)·김밥·도시락·샌드위치는 dish, 마시는 음료(디저트 병기 세트 포함)는 drink, 접시 단 디저트(케이크·타르트·마카롱·단\
    \ 떡·빙수)는 dessert, 빵·페이스트리(크루아상·소금빵·앙버터)는 bakery, 사물·포장 판매 식품(밀키트·티백·원두)은 object.\nJSON 키: {\"match\":true,\"seen\":\"\",\"domain\":\"food\",\"\
    display_name\":\"\",\"subject_en\":\"cafe latte\",\"category\":\"default\",\"core_ingredients\":[\"\
    espresso\",\"milk\"],\"texture_hero\":false,\"material\":\"default\",\"food_mode\":\"cafe\",\"lang\"\
    :\"ko\",\"container_kind\":\"cup\",\"container_color\":\"white\",\"container_opacity\":\"opaque\"\
    ,\"temperature\":\"hot\",\"view_angle\":\"eye\",\"visible_text\":\"\",\"identity_parts\":[\"coffee\"\
    ,\"latte art\"],\"flexible_parts\":[\"cup\",\"saucer\"],\"serving_type\":\"drink\"}"
verify_photo_subject:
  instruction: '사용자가 상품명 "${name}" 광고를 만들려고 이 사진을 올렸어. 사진의 주 피사체가 그 상품명과 **같은 종류**(같은 대분류의 음식/음료/제품이고
    대충 그럴듯)면 match=true. 색·브랜드·세부 차이는 무시하고 관대하게 판단해. 단, 사진에 그 상품이 **전혀 없으면**(무관한 사람·동물·풍경·빈 배경 등) match=false.

    JSON 으로만: {"match": true/false, "seen": "사진에 실제로 보이는 것 한 줄(한국어)"}'
detect_material:
  prompt: '이 사진 속 주된 사물의 표면 재질을 판정해 JSON 으로만 응답해.

    - reflective: 금속·거울·유광 플라스틱 등 반사 강한 표면

    - transparent: 유리·투명/반투명 재질

    - matte: 무광 플라스틱·세라믹·천·나무 등

    - default: 애매하거나 혼합

    반드시 JSON: {"material": "reflective"}'
detect_ingredients:
  instruction: '이 음식 사진에서 명확히 구분되는 **음식 재료 ${n}개**만 골라 JSON 으로만 응답해.

    접시·컵·포크·나이프·냅킨·테이블·그릇·소품은 절대 고르지 마(음식만).

    각 재료마다 그 재료의 실제 표면 안쪽 한 점의 상대좌표(x,y: 0~1, 좌상단 원점)를 줘. 점은 경계선·그림자·다른 음식 위가 아니라 그 재료 표면 중앙에.

    JSON: {"items":[{"name":"연어","name_en":"salmon slice","x":0.35,"y":0.45}, ... ${n}개]}'
analyze_image_for_style:
  prompt: '이 상품 이미지를 보고 어울리는 광고 스타일(문구 톤·색상) 후보 3개를 추천해줘. 각 후보는 다음 중 하나여야 해: ${preset_values}. 각 후보에 대해
    왜 이 이미지에 어울리는지 간단한 이유도 함께 작성해줘. 반드시 아래 JSON 형식으로만 응답해: {"candidates": [{"preset": "monotone", "reason":
    "..."}, {"preset": "warm_vintage", "reason": "..."}, {"preset": "pop", "reason": "..."}]}'
