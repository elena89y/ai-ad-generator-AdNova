# 상세페이지 레이아웃 DSL (DIRECTION_v6-1 L4b) — layout_engine.render_page 가 해석. 담당: 한의정.
#
# 세로 롱스크롤 8섹션. story/benefits 는 카피 길이로 높이 가변(height: {calc: ...}).
# 기존 하드코딩 조판(formats/detail_page.py) 데이터화, 픽셀 동등 검증(파일럿).
# hero 섹션만 margin 0.07(원본 _title_overlay 자체값), 나머지는 page 기본 0.06.
# cover_mode: int — 상세페이지 _cover 는 int 리사이즈(카드뉴스/배너의 round 와 다름).
bg_fill: white
cover_mode: int
sections:
  - name: hero
    height: 940
    margin_ratio: 0.07
    bg: {cut: hero}
    elements:
      - {type: bar, box: [0, 0, [fw, 1], 104], color: paper, alpha: 242}
      - {type: scrim, frm: [0, [fh, 0.80]], to: [[fw, 1], [fh, 1]], color: ink, amax: 205, fade: 80}
      - {type: text, at: [[margin], 37], bind: product_name, fallback: ADNOVA SELECT, font: 22, bold: true, color: [24, 24, 24]}
      - {type: rule, box: [[rmargin, -100], 52, [rmargin], 52], color: accent, width: 4}
      - {type: text, at: [[margin], [fh, 0.84]], bind: product_name, font: 23, bold: true, color: tint}
      - {type: text, at: [[margin], [fh, 0.90]], bind: intro_headline, font: {fit: [52, 34]}, color: white}
  - name: story
    height: {calc: story}
    bg: {fill: paper_warm}
    elements:
      - {type: text, at: [[margin], 64], text: PRODUCT STORY, font: 20, bold: true, color: accent}
      - {type: text, at: [[margin], 118], bind: story_title, font: {fit: [43, 29]}, color: [25, 25, 25]}
      - {type: text, at: [[margin], 205], bind: story_body, font: 22, color: [90, 90, 90], wrap_px: true, line_h: 38}
      - {type: rule, box: [[margin], [fh, 1, -56], [rmargin], [fh, 1, -56]], color: [190, 187, 180], width: 1}
  - name: benefits
    height: {calc: benefits}
    bg: {fill: white}
    elements:
      - {type: text, at: [[margin], 48], text: WHY THIS, font: 20, bold: true, color: accent}
      - {type: bullets, bind: benefit_bullets, y0: 96, row_h: 72, font: 27, dot: accent, num: white, color: [30, 30, 30]}
  - name: top_view
    height: 760
    bg: {cut: top_view}
    elements:
      - {type: section_label, bind: top_view_label, light: false}
  - name: closeup
    height: 720
    bg: {cut: texture_closeup}
    elements:
      - {type: section_label, bind: closeup_caption, light: true}
  - name: split
    height: 650
    images:
      - {cut: side_profile, at: [0, 0], size: [[fw, 0.56], [resth]]}
    elements:
      - {type: panel, box: [[fw, 0.56], 0, [fw, 1], [fh, 1]], color: deep}
      - {type: text, at: [[fwm, 0.56, 1], 85], text: PROFILE, font: 19, bold: true, color: tint}
      - {type: text, at: [[fwm, 0.56, 1], 150], bind: profile_title, font: 39, bold: true, color: white, spacing: 8}
      - {type: text, at: [[fwm, 0.56, 1], 310], bind: profile_caption, font: 21, color: tint, wrap_px: true, maxw: [wsub, 0.56, -2], line_h: 34, max_lines: 3}
  - name: lifestyle
    height: 820
    bg: {cut: lifestyle}
    elements:
      - {type: scrim, frm: [0, [fh, 0.78]], to: [[fw, 1], [fh, 1]], color: ink, amax: 200, fade: 90}
      - {type: text, at: [[margin], [fh, 0.82]], text: MOMENT, font: 20, bold: true, color: tint}
      - {type: text, at: [[margin], [fh, 0.88]], bind: lifestyle_line, font: {fit: [43, 29]}, color: white}
  - name: cta
    height: 320
    bg: {fill: [22, 22, 22]}
    elements:
      - {type: text, at: [[margin], 62], bind: cta_title, font: 36, bold: true, color: white}
      - {type: panel, box: [[margin], 172, [margin, 220], 238], color: accent}
      - {type: text, at: [[margin, 34], 190], bind: cta_label, font: 23, bold: true, color: white}
