# AdNova 고객센터 FAQ 초안 v1 — 담당: 한의정 (2026-07-21)
#
# 용도: ① 고객센터 FAQ 게시판 초안 ② 챗봇 RAG 지식 베이스 (단일 원본).
# 근거: 배포 홈페이지(adnova.iridescentseraphim.org) 공개 정보 + 서비스 구현 사실.
#
# ⚠️ [정책확정필요] 태그가 붙은 답변은 팀이 아직 확정하지 않은 정책의 "초안"이다.
#    챗봇은 해당 항목을 근거로 단정하지 말고 1:1 문의 안내를 덧붙인다 (needs_confirmation).
#
# 스키마: id(faq-도메인-번호) / category / question / answer / keywords(검색 보조 동의어)
#         / needs_confirmation(선택, 기본 false)

faqs:
  # --- 서비스 이용 -----------------------------------------------------------
  - id: faq-svc-001
    category: 서비스 이용
    question: AdNova는 어떤 서비스인가요?
    answer: >
      AdNova는 소상공인을 위한 AI 광고 생성 플랫폼입니다. 상품 사진 한 장과 상품명만
      올리면 AI가 광고 이미지·광고 문구·포스터를 몇 초 만에 자동으로 만들어 드립니다.
      디자이너나 마케터 없이도 SNS·배너·상세페이지용 광고를 바로 만들 수 있습니다.
    keywords: [애드노바, 소개, 뭐하는, 무슨 서비스, 광고 만들기]

  - id: faq-svc-002
    category: 서비스 이용
    question: 어떻게 사용하나요? 과정이 궁금해요.
    answer: >
      4단계면 충분합니다. ① 상품 사진 업로드 — 배경 제거·리사이즈·품질 보정이 자동으로
      처리됩니다. ② 스타일 결정 — AI 추천 스타일 중에 고르거나 원하는 무드를 직접 입력합니다.
      ③ AI 광고 이미지 생성 — 제품은 그대로 살리고 배경만 새로 그립니다. ④ 광고 문구까지
      자동 생성되면 SNS용으로 바로 내보낼 수 있습니다.
    keywords: [사용법, 이용 방법, 시작, 어떻게 만들어, 순서, 처음, 사용, 쓰는 법]

  - id: faq-svc-003
    category: 서비스 이용
    question: 어떤 스타일을 고를 수 있나요?
    answer: >
      6가지 스타일 프리셋을 제공합니다 — 모노톤, 웜빈티지, 팝, 에디토리얼, 레트로 페이퍼,
      파스텔 플로팅. AI가 상품에 어울리는 스타일을 추천해 주고, 마음에 들 때까지 다시
      생성할 수도 있습니다.
    keywords: [스타일, 프리셋, 종류, 무드, 모노톤, 빈티지, 팝, 에디토리얼]

  - id: faq-svc-004
    category: 서비스 이용
    question: 어떤 업종/상품에 쓸 수 있나요?
    answer: >
      음식점 메뉴, 카페 음료·디저트, 온라인 셀러의 제품 사진 등 실물 상품이면 대부분
      사용할 수 있습니다. AI가 상품 종류(음식/음료/사물)를 자동으로 인식해 각각에 맞는
      연출 방식을 적용합니다. 예를 들어 음식 사진은 그릇째 자연스럽게 보정하고, 제품
      사진은 스튜디오 촬영처럼 연출합니다.
    keywords: [업종, 음식점, 카페, 쇼핑몰, 셀러, 제품군, 지원 대상, 옷, 의류, 공산품, 잡화, 화장품]

  - id: faq-svc-005
    category: 서비스 이용
    question: 결과물이 마음에 안 들면 다시 만들 수 있나요?
    answer: >
      네. 같은 사진으로 재생성을 요청하면 새로운 연출로 다시 만들어 드립니다. 스타일을
      바꾸거나 연출 강도를 조절해서 다른 느낌으로도 시도해 보세요. Premium 플랜에서는
      재생성이 무제한입니다.
    keywords: [재생성, 다시, 마음에 안 들어, 리롤, 새로]

  - id: faq-svc-006
    category: 서비스 이용
    question: 생성된 광고는 어디서 다시 볼 수 있나요?
    answer: >
      히스토리 메뉴에서 지금까지 만든 광고를 한곳에서 관리하고 다시 불러올 수 있습니다.
      SNS, 카드뉴스, 배너, 상세페이지, 전단지 등 용도에 맞게 다시 내보내는 것도 가능합니다.
    keywords: [히스토리, 이전 결과, 저장, 다시 보기, 다운로드, 예전, 내가 만든, 이미지 다운로드, 어디서]

  # --- 사진 · 품질 -----------------------------------------------------------
  - id: faq-qual-001
    category: 사진·품질
    question: 사진을 어떻게 찍어야 결과가 잘 나오나요?
    answer: >
      ① 상품이 화면 중앙에 크게 나오게, ② 초점이 맞고 흔들리지 않게, ③ 자연광이나 밝은
      조명 아래에서 찍어 주세요. 배경이 복잡해도 괜찮습니다 — AI가 상품을 분리해 새 배경을
      그려 드립니다. 다만 상품이 너무 작거나 심하게 어두운 사진은 품질이 떨어질 수 있습니다.
    keywords: [촬영 팁, 사진 잘 찍는 법, 화질, 잘 나오게, 촬영 가이드]

  - id: faq-qual-002
    category: 사진·품질
    question: 내 상품이 실제와 다르게 바뀌지 않나요?
    answer: >
      AdNova는 "상품은 원본 그대로, 배경·조명·무드만 새로" 원칙으로 동작합니다. 상품의
      형태·색·구성은 보존하고 연출만 바꾸는 것이 기본입니다. 특히 음식의 경우 실제 들어간
      재료만 자연스럽게 살리고, 없는 재료나 장식을 만들어 붙이지 않도록 설계되어 있습니다 —
      허위·과장 광고를 방지하기 위한 정책입니다.
    keywords: [변형, 왜곡, 실제와 달라, 허위, 다르게 나와, 정체성]

  - id: faq-qual-003
    category: 사진·품질
    question: 생성이 실패하거나 너무 오래 걸려요.
    answer: >
      생성은 보통 수십 초 내에 완료되지만, 이용량이 몰리면 대기가 발생할 수 있습니다.
      몇 분 후에도 결과가 나오지 않으면 새로고침 후 다시 시도해 주세요. 같은 문제가
      반복되면 1:1 문의로 알려 주시면 확인해 드리겠습니다. Premium 플랜은 우선 생성
      처리가 적용됩니다.
    keywords: [실패, 오류, 에러, 느려요, 오래 걸려, 안 돼요, 멈춤, 로딩, 계속 돌아가요, 무한 로딩]

  - id: faq-qual-004
    category: 사진·품질
    question: 광고 문구도 만들어 주나요? 수정할 수 있나요?
    answer: >
      네. 완성된 광고 이미지를 AI가 분석해 어울리는 광고 문구(헤드라인·서브카피)를 자동으로
      작성합니다. 생성된 문구가 마음에 들지 않으면 재생성하거나 직접 수정해서 사용할 수
      있습니다. 과장·허위 소지가 있는 표현("최고", "1위" 등)은 자동으로 걸러지도록 설계되어
      있습니다.
    keywords: [카피, 문구, 카피라이팅, 글귀, 문구 수정]

  # --- 요금 · 크레딧 ---------------------------------------------------------
  - id: faq-bill-001
    category: 요금·크레딧
    question: 무료로 쓸 수 있나요?
    answer: >
      네. 가입 즉시 무료 크레딧 3개가 지급되어 바로 광고를 만들어 볼 수 있습니다.
      무료 플랜에서도 6가지 스타일 프리셋, AI 스타일 추천, 생성 히스토리 저장을 모두
      사용할 수 있습니다.
    keywords: [무료, 공짜, 체험, 무료 크레딧, 프리]

  - id: faq-bill-002
    category: 요금·크레딧
    question: Premium 플랜은 얼마이고 뭐가 다른가요?
    answer: >
      Premium은 월 9,900원입니다. 광고 생성 크레딧 무제한, 재생성 무제한, SNS 공유용
      내보내기, 우선 생성 처리가 포함됩니다. 본격적으로 판매를 시작한 셀러에게 추천합니다.
    keywords: [프리미엄, 요금, 가격, 구독, 월정액, 9900, 유료, 결제, 혜택, 업그레이드]
    # [백로그 2026-07-21] 랜딩("크레딧 무제한") vs support 페이지 FAQ("월 30크레딧+추가구매")
    # 불일치 — 팀 확정 대기. 확정 시 이 answer + 랜딩/서포트 문구 + 골든셋 동기화 필수.
    needs_confirmation: true

  - id: faq-bill-003
    category: 요금·크레딧
    question: 크레딧은 언제 차감되나요?
    answer: >
      광고 생성을 완료했을 때 1개가 차감되는 것이 기본입니다. 생성이 실패한 경우에는
      크레딧이 차감되지 않아야 정상이며, 실패했는데 차감된 것으로 보이면 1:1 문의로
      알려 주세요. 확인 후 복구해 드립니다.
    keywords: [크레딧 차감, 소모, 개수, 사용량]
    needs_confirmation: true  # [정책확정필요] 재생성 차감 여부·실패 시 자동복구 정책 팀 미확정

  - id: faq-bill-004
    category: 요금·크레딧
    question: 구독을 해지하거나 환불받고 싶어요.
    answer: >
      구독 해지는 계정의 결제 관리 메뉴에서 언제든지 할 수 있으며, 해지해도 결제 주기가
      끝날 때까지는 Premium 혜택이 유지됩니다. 환불 규정은 결제 시점과 사용 여부에 따라
      달라질 수 있으니, 정확한 안내가 필요하시면 1:1 문의로 요청해 주세요.
    keywords: [해지, 환불, 취소, 구독 취소, 결제 취소]
    needs_confirmation: true  # [정책확정필요] 환불 세부 규정(기간·부분환불) 팀 미확정

  # --- 계정 ------------------------------------------------------------------
  - id: faq-acct-001
    category: 계정
    question: 회원가입은 어떻게 하나요?
    answer: >
      별도 비밀번호 없이 구글·카카오·네이버 계정으로 3초 만에 가입할 수 있습니다.
      가입 즉시 무료 크레딧 3개가 지급됩니다.
    keywords: [가입, 회원가입, 로그인, 소셜, 구글, 카카오, 네이버]

  - id: faq-acct-002
    category: 계정
    question: 로그인이 안 돼요.
    answer: >
      ① 가입할 때 사용한 소셜 계정(구글/카카오/네이버)이 맞는지 확인해 주세요 — 같은
      이메일이라도 다른 소셜로 가입했다면 별개 계정입니다. ② 브라우저 쿠키/캐시를 지우고
      다시 시도해 주세요. ③ 그래도 안 되면 사용 중인 브라우저·기기 정보와 함께 1:1 문의를
      남겨 주세요.
    keywords: [로그인 안됨, 접속 불가, 로그인 오류, 계정 문제]

  - id: faq-acct-003
    category: 계정
    question: 탈퇴하면 내 데이터는 어떻게 되나요?
    answer: >
      탈퇴 시 계정 정보와 생성 히스토리는 관련 법령에 따른 보관 의무가 있는 정보를 제외하고
      삭제됩니다. 탈퇴 전에 필요한 광고 이미지는 미리 다운로드해 주세요.
    keywords: [탈퇴, 계정 삭제, 데이터 삭제, 개인정보]
    needs_confirmation: true  # [정책확정필요] 보관 기간·즉시삭제 범위 팀 미확정

  # --- 저작권 · 데이터 -------------------------------------------------------
  - id: faq-legal-001
    category: 저작권·데이터
    question: 생성된 광고 이미지를 상업적으로 써도 되나요?
    answer: >
      네, AdNova에서 생성한 광고 이미지와 문구는 본인 상품의 홍보 목적(SNS, 스마트스토어,
      배너, 인쇄물 등)으로 자유롭게 사용할 수 있습니다. 단, 업로드하는 원본 사진은 사용자
      본인이 권리를 가진 사진이어야 합니다.
    keywords: [저작권, 상업적 이용, 사용 범위, 라이선스, 스토어에 올려도]
    needs_confirmation: true  # [정책확정필요] 이용약관 문구와 대조 필요

  - id: faq-legal-002
    category: 저작권·데이터
    question: 업로드한 사진은 어떻게 처리되나요?
    answer: >
      업로드한 사진은 광고 생성 목적으로만 사용됩니다. 생성 결과와 함께 히스토리에
      보관되어 본인만 다시 볼 수 있습니다. 자세한 처리 방침은 개인정보처리방침을 참고해
      주세요.
    keywords: [사진 보관, 개인정보, 데이터 처리, 유출, 학습에 쓰이나]
    needs_confirmation: true  # [정책확정필요] AI 학습 활용 여부 명문화 필요

  - id: faq-legal-003
    category: 저작권·데이터
    question: 광고 심의나 표시광고법 걱정은 없나요?
    answer: >
      AdNova는 허위·과장 광고를 방지하도록 설계되어 있습니다 — 상품에 없는 재료나 구성을
      만들어 붙이지 않고, 문구에서도 "최고", "1위", "100%" 같은 근거 없는 표현을 걸러냅니다.
      다만 최종 광고물의 법적 책임은 광고주(사용자)에게 있으므로, 업종별 심의 기준(식품·
      건강기능식품 등)은 별도로 확인하시기를 권장합니다.
    keywords: [심의, 표시광고법, 허위광고, 과장광고, 법적 책임]

  # --- 문의 ------------------------------------------------------------------
  - id: faq-help-001
    category: 문의
    question: 1:1 문의는 어떻게 하나요?
    answer: >
      고객센터의 1:1 문의 게시판에서 카테고리를 선택하고 문의 내용을 남겨 주시면
      순차적으로 답변해 드립니다. 로그인 후 이용할 수 있으며, 내 문의 내역과 답변은
      문의 내역 페이지에서 확인할 수 있습니다.
    keywords: [문의, 문의하기, 상담, 연락, 고객센터, 답변]

  - id: faq-help-002
    category: 문의
    question: 문의 답변은 얼마나 걸리나요?
    answer: >
      영업일 기준 1~2일 안에 답변드리는 것을 목표로 하고 있습니다. 결제·오류 관련 문의는
      우선 처리됩니다.
    keywords: [답변 시간, 얼마나 걸려, 응답, 처리 기간]
    needs_confirmation: true  # [정책확정필요] SLA 팀 미확정

  # --- v1.2 추가 (2026-07-21): support 페이지 하드코딩 FAQ 2건을 KB 로 흡수 -----
