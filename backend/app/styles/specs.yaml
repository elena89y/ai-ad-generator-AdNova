# 스타일 디자인 토큰 원장 (DESIGN_SYSTEM_v1) — 담당: 한의정. (DIRECTION_v6 T1 소프트코딩)
#
# 새 스타일 추가 = 여기 specs 에 항목 추가 (코드 수정 불필요).
# ⚠️ 값은 전부 실측 튜닝치 — 변경 시 tests/test_style_specs_snapshot.py 가 감지한다.
#    의도적 변경이면 실험로그 기록 후 골든(tests/golden/style_specs.json)을 같은 커밋에서 갱신.
# 필드: mood(한국어 무드 설명) palette(대표 hex 2~3) head_font/sub_font(overlay_service._font kind)
#       accent(RGB) production(hybrid|generative) scene_prompt({subject} 치환) negative(완성 문자열)
specs:
  editorial:
    mood: 하이엔드 매거진·룩북, 프리미엄 미니멀 자연광
    palette:
    - '#F2ECE0'
    - '#D8CFBB'
    - '#3B2F2A'
    head_font: serif_elegant
    sub_font: gothic
    accent:
    - 59
    - 47
    - 42
    production: hybrid
    scene_prompt: premium editorial hero shot of {subject} on a clean muted cream surface, single centered
      subject, soft natural window light, generous empty negative space, minimalist high-end lookbook,
      no props, no collage
    negative: cluttered background, scattered crumbs, excessive props, long sentences, busy infographic,
      harsh shadows, watermark, logo, cropped, placeholder text, lorem ipsum
  pop:
    mood: 하이퍼리얼 제품×음식/스포츠 크리에이티브 합성, 강한 측광 8k
    palette:
    - '#F2A93B'
    - '#C42E5C'
    - '#1E7A5A'
    head_font: display_heavy
    sub_font: gothic_bold
    accent:
    - 196
    - 46
    - 92
    production: generative
    scene_prompt: hyper-realistic premium product photography of {subject}, creative composition with
      dessert/lifestyle objects, glossy viscous highlights, intense side lighting, shallow depth of field,
      8k, vivid textures, --ar 4:5
    negative: cluttered background, scattered crumbs, excessive props, long sentences, busy infographic,
      harsh shadows, watermark, logo, cropped, placeholder text, lorem ipsum, low saturation, dull
  realism:
    mood: 사진 사실감 우선 스튜디오 푸드 — 실제 질감·자연광, 매크로 디테일
    palette:
    - '#EFE7D8'
    - '#E7C3C9'
    - '#9FB98A'
    head_font: serif_elegant
    sub_font: gothic
    accent:
    - 120
    - 100
    - 80
    production: hybrid
    scene_prompt: photorealistic premium studio food photograph of {subject}, true-to-life natural surface
      texture and moisture, sharp macro detail, for meat keep the white fat marbling and deep red lean
      clearly distinct, cinematic soft natural light, shallow depth, clean gradient background, generous
      negative space, --ar 4:5
    negative: cluttered background, scattered crumbs, excessive props, long sentences, busy infographic,
      harsh shadows, watermark, logo, cropped, placeholder text, lorem ipsum, CGI, 3d render, plastic,
      toy, wax figure, cartoon, smoothed over, overly glossy, fake food texture, uniform color, overcrowded
      ingredients
  pastel_float:
    mood: 몽환·부유·산뜻, 소프트 물결 에테리얼 하이키
    palette:
    - '#F6D8E4'
    - '#E5DCF2'
    - '#D9F0E6'
    head_font: display_round
    sub_font: gothic
    accent:
    - 198
    - 150
    - 190
    production: hybrid
    scene_prompt: soft pastel studio still life of {subject} as the clear sharp-focus hero,
      product kept crisp and true to its real shape, outline and color, gentle pastel gradient
      backdrop in blush pink and lavender, soft diffused high-key light, one subtle soft shadow
      on a clean minimal surface, airy premium dreamy pastel mood, --ar 4:5
    negative: distorted product, melted edges, warped shape, blurred subject, floating in water,
      submerged, cluttered background, scattered crumbs, excessive props, long sentences, busy
      infographic, harsh shadows, watermark, logo, cropped, placeholder text, lorem ipsum
  monotone:
    mood: 모노크롬 톤온톤(단일 색계열) 볼드 미니멀 임팩트
    palette:
    - '#C42E2E'
    - '#E7A63A'
    - '#C42E2E'
    head_font: display_heavy
    sub_font: gothic_bold
    accent:
    - 231
    - 166
    - 58
    production: hybrid
    scene_prompt: monochromatic tone-on-tone product shot of {subject}, single dominant color, bold minimal,
      large brand typography, clean even lighting, --ar 4:5
    negative: cluttered background, scattered crumbs, excessive props, long sentences, busy infographic,
      harsh shadows, watermark, logo, cropped, placeholder text, lorem ipsum
  warm_vintage:
    mood: 따뜻한 프리미엄 라이프스타일, 원목·골든아워·감성 (제품색 보존)
    palette:
    - '#E8D9C0'
    - '#C9A876'
    - '#A97F4F'
    head_font: serif_elegant
    sub_font: gothic
    accent:
    - 169
    - 127
    - 79
    production: hybrid
    scene_prompt: warm premium lifestyle photograph of {subject} as the clear hero in sharp focus, a wooden
      surface with dried wheat and soft cafe props blurred in the background, gentle golden-hour side
      light, elegant soft shadows, keep the food's real vivid colors and appetizing texture, no packaging,
      no plastic bag, --ar 4:5
    negative: cluttered background, scattered crumbs, excessive props, long sentences, busy infographic,
      harsh shadows, watermark, logo, cropped, placeholder text, lorem ipsum, plastic bag, wrapping, packaging,
      washed-out monochrome, orange color cast, dull food
  pop_split:
    mood: 여름음료 2패널 50:50 — 상단 매크로 / 하단 상품컷+컵뒤 블록레터
    palette:
    - '#EEE7D4'
    - '#C98418'
    - '#2E2338'
    head_font: condensed
    sub_font: gothic
    accent:
    - 201
    - 132
    - 24
    production: hybrid
    scene_prompt: extreme macro close-up of the ice cubes and {subject} liquid surface, filling the frame,
      glossy wet reflections, cold, high detail, no glass rim, no background
    negative: cluttered background, scattered crumbs, excessive props, long sentences, busy infographic,
      harsh shadows, watermark, logo, cropped, placeholder text, lorem ipsum
  object_studio:
    mood: 단일 히어로 제품 · 반사 페데스탈 · 드라마틱 림라이트 · 딥톤/제품색 배경
    palette:
    - '#14121A'
    - '#C9A15A'
    - '#F2ECE0'
    head_font: display_heavy
    sub_font: gothic_bold
    accent:
    - 201
    - 161
    - 90
    production: hybrid
    scene_prompt: 'Keep the {subject} exactly as it is: identical shape, outline, proportions, color,
      material and every surface detail — do NOT redraw, reshape, smooth, round or restyle the object
      itself. Change ONLY the surroundings: replace the background with a deep dark studio gradient, add
      dramatic rim lighting and a subtle glossy floor reflection beneath it.'
    negative: distorted logo, warped brand text, mirrored text, misspelled label, altered product shape,
      changed product color, extra duplicate products, cluttered background, long sentences, placeholder
      text, lorem ipsum, watermark
  object_splash:
    mood: 부유 제품 · 성분/물 스플래시 · 제품색 모노팔레트 · 다이내믹 앵글
    palette:
    - '#0E2A44'
    - '#3E7CB1'
    - '#EAF2F8'
    head_font: condensed
    sub_font: gothic
    accent:
    - 62
    - 124
    - 177
    production: hybrid
    scene_prompt: 'Keep the {subject} exactly as it is: identical shape, outline, proportions, color,
      material and every surface detail — do NOT redraw, reshape, smooth or restyle the object itself.
      Change ONLY the surroundings: make it appear floating mid-air in a dynamic diagonal composition,
      add splashing water droplets around it, a monochromatic color-echo background tied to the product''s
      color, and a dramatic beam of light.'
    negative: distorted logo, warped brand text, mirrored text, misspelled label, altered product shape,
      changed product color, extra duplicate products, cluttered background, long sentences, placeholder
      text, lorem ipsum, watermark
  cross_section:
    mood: 프리미엄 파티세리 단면 매크로 — 레이어별 물성, 프레임 꽉 참, 여백 0
    palette:
    - '#F4EDE1'
    - '#C25B4E'
    - '#7A5A3A'
    head_font: serif_elegant
    sub_font: gothic
    accent:
    - 122
    - 90
    - 58
    production: generative
    scene_prompt: extreme macro front-facing cross-section of {subject}, camera at exact eye-level 0-degree,
      all layers sheared flat on one continuous vertical plane, hyper-real per-layer texture (moisture,
      gloss, air pockets, crumb), focus stacked no bokeh, premium patisserie campaign, the sliced cross-section
      fills the entire frame, zero negative space, not a whole cake, not angled, not isometric, --ar 4:5
    negative: cluttered background, scattered crumbs, excessive props, long sentences, busy infographic,
      harsh shadows, watermark, logo, cropped, placeholder text, lorem ipsum, whole cake, three-quarter
      view, angled view, isometric, cake top visible
